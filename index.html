<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Daily Task – z logowaniem</title>
  <style>
    body {
      font-family: system-ui;
      background: #f4f4f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      background: white;
      margin-top: 40px;
      padding: 24px 28px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 520px;
      width: 100%;
    }
    h1, h2 { margin-top: 0; }
    input, button {
      padding: 10px;
      margin-top: 6px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      margin-top: 12px;
    }
    #app { display: none; }
    #authBox { margin-bottom: 30px; }
  </style>
</head>
<body>

  <!-- 🔐 LOGOWANIE -->
  <div class="container" id="authBox">
    <h1>Logowanie</h1>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Hasło" />

    <button id="loginBtn">Zaloguj</button>
    <button id="registerBtn" style="background:#4b5563;">Zarejestruj</button>

    <div id="authMessage" style="margin-top:10px; color:#b91c1c;"></div>
  </div>

  <!-- 🔥 TWOJA APLIKACJA -->
  <div class="container" id="app">
    <h1>Dzisiejsze jedno zadanie</h1>
    <button id="logoutBtn" style="background:#b91c1c; margin-bottom:20px;">Wyloguj</button>

    <label for="taskInput">Najważniejsze zadanie na dziś</label>
    <input id="taskInput" type="text" placeholder="Np. Zadzwonić do klienta X" />

    <button id="saveTaskBtn">Zapisz</button>
    <button id="markDoneBtn" style="background:#16a34a;">Zrobione</button>
    <button id="markNotDoneBtn" style="background:#b91c1c;">Niezrobione</button>

    <h2>Historia 7 dni</h2>
    <div id="historyList"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

  <script>
    // 🔥 Wklej tutaj swoje dane z Firebase Console
    const firebaseConfig = {
       apiKey: "AIzaSyDKUmLRK3MbYPyiNJZAbuuOzpFvce5xP84",
  authDomain: "daily-task-app-72db5.firebaseapp.com",
  projectId: "daily-task-app-72db5",
  storageBucket: "daily-task-app-72db5.firebasestorage.app",
  messagingSenderId: "97589713655",
  appId: "1:97589713655:web:e0b0e43fa5dc39405991f2",
  measurementId: "G-21JESBMJBH"

    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 🔐 UI ELEMENTY
    const authBox = document.getElementById("authBox");
    const appBox = document.getElementById("app");
    const authMessage = document.getElementById("authMessage");

    // 🔐 LOGOWANIE
    document.getElementById("loginBtn").onclick = () => {
      const email = emailInput.value;
      const pass = passwordInput.value;

      auth.signInWithEmailAndPassword(email, pass)
        .catch(err => authMessage.textContent = err.message);
    };

    // 🔐 REJESTRACJA
    document.getElementById("registerBtn").onclick = () => {
      const email = emailInput.value;
      const pass = passwordInput.value;

      auth.createUserWithEmailAndPassword(email, pass)
        .catch(err => authMessage.textContent = err.message);
    };

    // 🔐 WYLOGOWANIE
    document.getElementById("logoutBtn").onclick = () => auth.signOut();

    // 🔥 OBSŁUGA STANU LOGOWANIA
    auth.onAuthStateChanged(user => {
      if (user) {
        authBox.style.display = "none";
        appBox.style.display = "block";
        loadUI();
      } else {
        authBox.style.display = "block";
        appBox.style.display = "none";
      }
    });

    // 🔥 DANE PER UŻYTKOWNIK
    function storageKey() {
      return "dailyFocus_" + auth.currentUser.uid;
    }

    function loadData() {
      return JSON.parse(localStorage.getItem(storageKey()) || "{}");
    }

    function saveData(data) {
      localStorage.setItem(storageKey(), JSON.stringify(data));
    }

    // 🔥 LOGIKA APLIKACJI
    function todayKey() {
      const d = new Date();
      return d.toISOString().split("T")[0];
    }

    function loadUI() {
      const data = loadData();
      const entry = data[todayKey()] || {};

      document.getElementById("taskInput").value = entry.task || "";
      loadHistory();
    }

    document.getElementById("saveTaskBtn").onclick = () => {
      const data = loadData();
      data[todayKey()] = { task: taskInput.value, status: "none" };
      saveData(data);
      loadUI();
    };

    document.getElementById("markDoneBtn").onclick = () => {
      const data = loadData();
      if (!data[todayKey()]) return;
      data[todayKey()].status = "done";
      saveData(data);
      loadUI();
    };

    document.getElementById("markNotDoneBtn").onclick = () => {
      const data = loadData();
      if (!data[todayKey()]) return;
      data[todayKey()].status = "not-done";
      saveData(data);
      loadUI();
    };

    function loadHistory() {
      const data = loadData();
      const list = document.getElementById("historyList");
      list.innerHTML = "";

      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split("T")[0];

        const entry = data[key];
        const status = entry?.status || "—";
        const task = entry?.task || "(brak)";

        const row = document.createElement("div");
        row.textContent = `${key}: ${task} — ${status}`;
        list.appendChild(row);
      }
    }
  </script>
</body>
</html>
